<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Indian Capitals Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="quiz-area">
        <h1>Baby Quiz</h1>
        <p>Choose your quiz:</p>
        <div class="menu-grid">
            <div onclick="Engine.init('states')" class="mode-btn"><h2>🗺️ Indian States</h2><p>28 Questions</p></div>
            <div onclick="Engine.init('uts')" class="mode-btn"><h2>📍 Union Territories</h2><p>8 Questions</p></div>
            <div onclick="Engine.init('math')" class="mode-btn"><h2>🧮 Addition</h2><p>20 Questions</p></div>
            <div onclick="Engine.init('subtraction')" class="mode-btn"><h2>➖ Subtraction</h2><p>20 Questions</p></div>
            <div onclick="Engine.init('monuments')" class="mode-btn"><h2>🏰 Indian Monuments</h2><p>50 Questions</p></div>
            <div onclick="Engine.init('symbols')" class="mode-btn"><h2>🚩 National Symbols</h2><p>15 Questions</p></div>
            <div onclick="Engine.init('families')" class="mode-btn"><h2>🦁 Animal Families</h2><p>15 Questions</p></div>
            <div onclick="Engine.init('homes')" class="mode-btn"><h2>🏠 Animal Homes</h2><p>15 Questions</p></div>
        </div>
    </div>
    <div id="math-equation-area" class="hidden"></div>
    <div id="counting-zone" class="hidden"></div>
</div>

    <script src="data.js?v=2"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
