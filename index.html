<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Indian Capitals Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="quiz-area">
        <h1>Baby Quiz</h1>
        <p>Choose your quiz:</p>
        <div onclick="Engine.init('states')" class="mode-btn"><h2>🗺️ Indian States</h2><p>28 Questions</p></div>
        <div onclick="Engine.init('uts')" class="mode-btn"><h2>📍 Union Territories</h2><p>8 Questions</p></div>
        <div onclick="Engine.init('math')" class="mode-btn"><h2>🧮 Addition</h2><p>20 Questions</p></div>
        <div onclick="Engine.init('subtraction')" class="mode-btn"><h2>➖ Subtraction</h2><p>20 Questions</p></div>
        <div onclick="Engine.init('monuments')" class="mode-btn"><h2>🏰 Indian Monuments</h2><p>20 Questions</p></div>
    </div>
    <div id="math-equation-area" class="hidden"></div>
    <div id="counting-zone" class="hidden"></div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3>Go back to the main menu?</h3>
        <p>You will lose your current score!</p>
        <button style="background: var(--error);" onclick="Engine.confirmExit(true)">Yes, Exit</button>
        <button style="background: var(--success);" onclick="Engine.confirmExit(false)">No, Stay</button>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
